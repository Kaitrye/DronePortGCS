name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y make

    - name: Create .env
      run: cp docker/example.env docker/.env

    - name: Initialization
      run: make init

    - name: Run unit-tests
      run: make unit-test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y make

    - name: Create .env
      run: cp docker/example.env docker/.env

    - name: Initialization
      run: make init

    - name: Docker up
      run: |
        make docker-up
        make dummy-system-up
        make gcs-system-up

    - name: Wait for GCS readiness
      run: bash scripts/wait_gcs_readiness.sh

    - name: Run integration-tests
      run: make integration-test-run

    - name: Dump docker logs
      if: failure()
      run: make docker-logs-ci

    - name: Docker down
      if: always()
      run: |
        make gcs-system-down
        make dummy-system-down
        make docker-down

      