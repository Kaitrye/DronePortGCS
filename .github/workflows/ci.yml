name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y make

    - name: Create .env
      run: cp docker/example.env docker/.env

    - name: Initialization
      run: make init

    - name: Run unit-tests
      run: make unit-test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y make

    - name: Create .env
      run: cp docker/example.env docker/.env

    - name: Initialization
      run: make init

    - name: Docker up
      run: make dummy-system-up

    - name: Run integration-tests
      run: make integration-test-run

    - name: Docker down
      if: always()
      run: make dummy-system-down
