# Docker Compose для GCS.
# Только сервисы компонентов. Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл НЕ используется напрямую — его собирает scripts/prepare_system.py.

services:
  redis:
    image: redis:7-alpine
    profiles: ["kafka", "mqtt"]
    networks:
      - drones_net
    restart: unless-stopped

  mission_store:
    build:
      context: ../..
      dockerfile: systems/gcs/src/mission_store/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    command: ["python", "-m", "systems.gcs.src.mission_store"]
    environment:
      - COMPONENT_ID=gcs_mission_store
      - SECURITY_MONITOR_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MISSION_STORE_REDIS_DB=0
      - DRONE_STORE_REDIS_DB=1
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    depends_on:
      - redis
    restart: unless-stopped

  drone_store:
    build:
      context: ../..
      dockerfile: systems/gcs/src/drone_store/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    command: ["python", "-m", "systems.gcs.src.drone_store"]
    environment:
      - COMPONENT_ID=gcs_drone_store
      - SECURITY_MONITOR_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MISSION_STORE_REDIS_DB=0
      - DRONE_STORE_REDIS_DB=1
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    depends_on:
      - redis
    restart: unless-stopped

  mission_converter:
    build:
      context: ../..
      dockerfile: systems/gcs/src/mission_converter/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_mission_converter
      - SECURITY_MONITOR_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MISSION_STORE_REDIS_DB=0
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    depends_on:
      - redis
    restart: unless-stopped

  orchestrator:
    build:
      context: ../..
      dockerfile: systems/gcs/src/orchestrator/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_orchestrator
      - SECURITY_MONITOR_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  path_planner:
    build:
      context: ../..
      dockerfile: systems/gcs/src/path_planner/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_path_planner
      - SECURITY_MONITOR_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MISSION_STORE_REDIS_DB=0
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    depends_on:
      - redis
    restart: unless-stopped

  drone_manager:
    build:
      context: ../..
      dockerfile: systems/gcs/src/drone_manager/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_drone_manager
      - SECURITY_MONITOR_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MISSION_STORE_REDIS_DB=0
      - DRONE_STORE_REDIS_DB=1
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    depends_on:
      - redis
    restart: unless-stopped

  security_monitor:
    build:
      context: ../..
      dockerfile: systems/gcs/src/security_monitor/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_security_monitor
      - COMPONENT_TOPIC=${GCS_MONITOR_TOPIC:-systems.gcs}
      - INSTANCE_ID=${INSTANCE_ID:-1}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S=${SECURITY_MONITOR_PROXY_REQUEST_TIMEOUT_S:-10.0}
      - SECURITY_JOURNAL_FILE_PATH=${SECURITY_JOURNAL_FILE_PATH:-/var/log/drones/security_journal.ndjson}
      - SECURITY_JOURNAL_MIN_SEVERITY=${SECURITY_JOURNAL_MIN_SEVERITY:-info}
      - SECURITY_JOURNAL_SERVICE_ID=${GCS_SERVICE_ID:-1}
      - INFOPANEL_URL=${INFOPANEL_URL:-}
      - INFOPANEL_API_KEY=${INFOPANEL_GCS_API_KEY:-}
      - INFOPANEL_BATCH_SIZE=${INFOPANEL_BATCH_SIZE:-50}
      - INFOPANEL_FLUSH_INTERVAL_S=${INFOPANEL_FLUSH_INTERVAL_S:-5.0}
      - INFOPANEL_MAX_RETRIES=${INFOPANEL_MAX_RETRIES:-5}
      - INFOPANEL_VERIFY_TLS=${INFOPANEL_VERIFY_TLS:-true}
      - PYTHONUNBUFFERED=1
    extra_hosts:
      # Доступ к Инфопанели, запущенной в отдельном compose-проекте на той же машине.
      # Используем для INFOPANEL_URL=https://host.docker.internal/api/log/event при локальном smoke.
      - "host.docker.internal:host-gateway"
    volumes:
      - gcs_journal:/var/log/drones
    networks:
      - drones_net
    restart: unless-stopped

volumes:
  gcs_journal:

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
