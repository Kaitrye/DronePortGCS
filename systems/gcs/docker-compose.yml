# Docker Compose для GCS.
# Только сервисы компонентов. Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл НЕ используется напрямую — его собирает scripts/prepare_system.py.

services:
  redis:
    image: redis:7-alpine
    profiles: ["kafka", "mqtt"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - drones_net
    restart: unless-stopped

  redis_component:
    build:
      context: ../..
      dockerfile: systems/gcs/src/redis_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_redis
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - HEALTH_PORT=9806
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    depends_on:
      - redis
    restart: unless-stopped

  mission_component:
    build:
      context: ../..
      dockerfile: systems/gcs/src/mission_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_mission
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=9800
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  orchestrator_component:
    build:
      context: ../..
      dockerfile: systems/gcs/src/orchestrator_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_orchestrator
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=9801
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  fleet_component:
    build:
      context: ../..
      dockerfile: systems/gcs/src/fleet_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_fleet
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=9802
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  robot_component:
    build:
      context: ../..
      dockerfile: systems/gcs/src/robot_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_robot
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=9803
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  telemetry_component:
    build:
      context: ../..
      dockerfile: systems/gcs/src/telemetry_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=gcs_telemetry
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=9804
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
