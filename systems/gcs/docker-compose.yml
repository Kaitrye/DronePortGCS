# Docker Compose для gcs.
# Только сервисы компонентов. Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл НЕ используется напрямую — его собирает scripts/prepare_system.py.

services:
  gcs_comp_a:
    build:
      context: ../..
      dockerfile: systems/gcs/src/gcs_comp_a/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=dummy_component_a
      - ENABLE_ELK=${ENABLE_ELK:-false}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER_A:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD_A:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  gcs_comp_b:
    build:
      context: ../..
      dockerfile: systems/gcs/src/gcs_comp_b/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=dummy_component_b
      - ENABLE_ELK=${ENABLE_ELK:-false}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER_B:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD_B:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
