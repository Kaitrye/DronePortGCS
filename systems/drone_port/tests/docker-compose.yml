version: '3.8'

services:
  # === Инфраструктура для тестов ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.8
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics.sh --list --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # === Тестовые сервисы ===
  power_health_manager_test:
    build:
      context: ../
      dockerfile: src/power_health_manager/docker/Dockerfile.test
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    depends_on:
      - redis
    command: pytest tests/unit/test_power_health_manager.py -v

  drone_registry_test:
    build:
      context: ../
      dockerfile: src/drone_registry/docker/Dockerfile.test
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    depends_on:
      - redis
    command: pytest tests/unit/test_drone_registry.py -v

  port_manager_test:
    build:
      context: ../
      dockerfile: src/port_manager/docker/Dockerfile.test
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    depends_on:
      - redis
    command: pytest tests/unit/test_port_manager.py -v

  state_store_test:
    build:
      context: ../
      dockerfile: src/state_store/docker/Dockerfile.test
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    depends_on:
      - redis
    command: pytest tests/unit/test_state_store.py -v

  orchestrator_test:
    build:
      context: ../
      dockerfile: src/droneport_orchestrator/docker/Dockerfile.test
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    depends_on:
      - redis
    command: pytest tests/unit/test_orchestrator.py -v