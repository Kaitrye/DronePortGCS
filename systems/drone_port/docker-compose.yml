version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - droneport_net

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    # volumes:
    #   - ./docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    command: mosquitto -c /mosquitto-no-auth.conf
    networks:
      - droneport_net

  orchestrator:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/droneport_orchestrator/docker/Dockerfile
    environment:
      - SYSTEM_ID=dp-001
      - COMPONENT_ID=orchestrator
      - BROKER_HOST=mqtt
      - BROKER_PORT=1883
      - HEALTH_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - mqtt
    networks:
      - droneport_net

  drone_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/drone_manager/docker/Dockerfile
    environment:
      - SYSTEM_ID=dp-001
      - COMPONENT_ID=drone_manager
      - BROKER_HOST=mqtt
      - BROKER_PORT=1883
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      - mqtt
    networks:
      - droneport_net

  drone_registry:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/drone_registry/docker/Dockerfile
    environment:
      - SYSTEM_ID=dp-001
      - COMPONENT_ID=drone_registry
      - BROKER_HOST=mqtt
      - BROKER_PORT=1883
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEALTH_PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      - mqtt
      - redis
    networks:
      - droneport_net

  port_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/port_manager/docker/Dockerfile
    environment:
      - SYSTEM_ID=dp-001
      - COMPONENT_ID=port_manager
      - BROKER_HOST=mqtt
      - BROKER_PORT=1883
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEALTH_PORT=8083
    ports:
      - "8083:8083"
    depends_on:
      - mqtt
      - redis
    networks:
      - droneport_net

  charging_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/charging_manager/docker/Dockerfile
    environment:
      - SYSTEM_ID=dp-001
      - COMPONENT_ID=charging_manager
      - BROKER_HOST=mqtt
      - BROKER_PORT=1883
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEALTH_PORT=8084
    ports:
      - "8084:8084"
    depends_on:
      - mqtt
      - redis
    networks:
      - droneport_net

networks:
  droneport_net:
    driver: bridge