version: '3.8'

services:
  # === Redis (хранилище состояния) ===
  redis:
    image: redis:7-alpine
    container_name: droneport_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - droneport_network

  # === Droneport Orchestrator (маршрутизация) ===
  orchestrator:
    build:
      context: ./src/droneport_orchestrator
      dockerfile: docker/Dockerfile
    container_name: droneport_orchestrator
    environment:
      - COMPONENT_ID=droneport_orchestrator
      - SYSTEM_ID=${SYSTEM_ID:-dp-001}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROKER_HOST=${BROKER_HOST:-localhost}
      - BROKER_PORT=${BROKER_PORT:-1883}
      - HEALTH_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - droneport_network
    restart: unless-stopped

  # === DroneManager (команды дронам, SITL) ===
  drone_manager:
    build:
      context: ./src/drone_manager
      dockerfile: docker/Dockerfile
    container_name: drone_manager
    environment:
      - COMPONENT_ID=drone_manager
      - SYSTEM_ID=${SYSTEM_ID:-dp-001}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROKER_HOST=${BROKER_HOST:-localhost}
      - BROKER_PORT=${BROKER_PORT:-1883}
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - droneport_network
    restart: unless-stopped

  # === DroneRegistry (Facade, реестр дронов) ===
  drone_registry:
    build:
      context: ./src/drone_registry
      dockerfile: docker/Dockerfile
    container_name: drone_registry
    environment:
      - COMPONENT_ID=drone_registry
      - SYSTEM_ID=${SYSTEM_ID:-dp-001}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROKER_HOST=${BROKER_HOST:-localhost}
      - BROKER_PORT=${BROKER_PORT:-1883}
      - HEALTH_PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - droneport_network
    restart: unless-stopped

  # === PortManager (посадочные места) ===
  port_manager:
    build:
      context: ./src/port_manager
      dockerfile: docker/Dockerfile
    container_name: port_manager
    environment:
      - COMPONENT_ID=port_manager
      - SYSTEM_ID=${SYSTEM_ID:-dp-001}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROKER_HOST=${BROKER_HOST:-localhost}
      - BROKER_PORT=${BROKER_PORT:-1883}
      - HEALTH_PORT=8083
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - droneport_network
    restart: unless-stopped

  # === ChargingManager (зарядка) ===
  charging_manager:
    build:
      context: .
      dockerfile: src/charging_mananger/docker/Dockerfile
    container_name: charging_manager
    environment:
      - COMPONENT_ID=charging_manager
      - SYSTEM_ID=${SYSTEM_ID:-dp-001}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROKER_HOST=${BROKER_HOST:-localhost}
      - BROKER_PORT=${BROKER_PORT:-1883}
      - HEALTH_PORT=8084
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - droneport_network
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./shared:/app/shared          # Добавить
      - ./broker:/app/broker          # Добавить
      - ./config:/app/config 

  # === SITL Simulator (опционально, для тестов) ===
  sitl:
    image: ardupilot/sitl:latest
    container_name: droneport_sitl
    environment:
      - VEHICLE=ArduCopter
    ports:
      - "5760:5760/udp"
      - "14550:14550/udp"
    networks:
      - droneport_network
    profiles:
      - simulation
    restart: unless-stopped

networks:
  droneport_network:
    driver: bridge

volumes:
  redis_data: