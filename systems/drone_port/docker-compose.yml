# Docker Compose для DronePort.
# Только сервисы компонентов. Брокер запускается отдельно (docker/docker-compose.yml).
# Этот файл НЕ используется напрямую — его собирает scripts/prepare_system.py.

services:
  redis:
    image: redis:7-alpine
    profiles: ["kafka", "mqtt"]
    networks:
      - drones_net
    restart: unless-stopped

  landing_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/landing_manager/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=landing_manager
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped
    depends_on:
      - redis

  takeoff_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/takeoff_manager/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=takeoff_manager
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped
    depends_on:
      - redis

  port_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/port_manager/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=port_manager
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  drone_registry:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/drone_registry/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=drone_registry
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped
    depends_on:
      - redis

  charging_manager:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/charging_manager/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=charging_manager
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: systems/drone_port/src/gateway/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_ID=drone_port
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin_secret_123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=8080
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    networks:
      - drones_net
    restart: unless-stopped
    depends_on:
      - landing_manager
      - takeoff_manager
      - port_manager
      - drone_registry
      - charging_manager

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}